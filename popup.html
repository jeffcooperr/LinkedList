<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    /* ── Auth screen ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 32px 40px;
      gap: 12px;
    }
    .brand-name { font-size: 26px; font-weight: 800; color: #0a66c2; letter-spacing: -0.5px; }
    .brand-tagline { font-size: 13px; color: #666; text-align: center; margin-bottom: 12px; }
    #signin-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    #signin-btn:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.15); }
    #auth-error { font-size: 12px; color: #c0392b; min-height: 16px; text-align: center; }

    /* ── Main screen ── */
    #main-screen { display: none; }
    header {
      background: #0a66c2;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
    #job-count {
      background: rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 12px;
    }
    #user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 16px;
      background: #f0f7ff;
      border-bottom: 1px solid #d0e8ff;
      font-size: 11px;
      color: #555;
    }
    #user-email { font-weight: 500; }
    #signout-btn {
      background: none;
      border: none;
      color: #0a66c2;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
    }
    #signout-btn:hover { text-decoration: underline; }
    #toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid #eee;
    }
    .toolbar-btn {
      flex: 1;
      padding: 6px 0;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #0a66c2;
      color: #0a66c2;
      background: #fff;
    }
    .toolbar-btn:hover { background: #0a66c2; color: #fff; }
    .toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .toolbar-btn:disabled:hover { background: #fff; color: #0a66c2; }
    #empty {
      padding: 32px 16px;
      text-align: center;
      color: #888;
      display: none;
    }
    #empty p { margin-top: 6px; font-size: 12px; }
    #job-list { max-height: 300px; overflow-y: auto; }
    .job-card {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      position: relative;
    }
    .job-card:hover { background: #f9f9f9; }
    .job-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; padding-right: 20px; }
    .job-meta { color: #555; font-size: 12px; margin-bottom: 4px; }
    .job-card:hover .job-title { color: #0a66c2; }
    .job-date { color: #aaa; font-size: 11px; margin-top: 3px; }
    .remove-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }
    .remove-btn:hover { color: #c0392b; }

    /* ── Email section ── */
    #email-section { border-top: 2px solid #f0f0f0; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      background: #fafafa;
    }
    #enable-gmail-btn {
      font-size: 11px;
      font-weight: 600;
      color: #6366f1;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    #enable-gmail-btn:hover { text-decoration: underline; }
    #email-list { max-height: 200px; overflow-y: auto; }
    .email-card {
      padding: 8px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      text-decoration: none;
      color: inherit;
    }
    .email-card:hover { background: #f9f9f9; cursor: pointer; }
    .status-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 1px;
    }
    .status-badge--Applied       { background: #e8f0fe; color: #1a73e8; }
    .status-badge--Interviewing  { background: #fef9e7; color: #c07800; }
    .status-badge--Phone-Screen  { background: #f3e8ff; color: #7c3aed; }
    .status-badge--Offer         { background: #e6f4ea; color: #1e8e3e; }
    .status-badge--Rejected      { background: #fce8e6; color: #d93025; }
    .email-body { flex: 1; min-width: 0; }
    .email-company { font-weight: 600; font-size: 12px; }
    .email-subject { font-size: 11px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-time { font-size: 10px; color: #aaa; margin-top: 2px; }
    #email-empty { padding: 16px; text-align: center; color: #aaa; font-size: 12px; }
    .email-title { font-size: 11px; color: #444; font-style: italic; }

    /* ── Needs Review section ── */
    #unresolved-section { border-top: 2px solid #f0f0f0; }
    .unresolved-card {
      padding: 8px 16px 10px;
      border-bottom: 1px solid #f0f0f0;
      background: #fffdf0;
    }
    .unresolved-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .unresolved-company { font-weight: 600; font-size: 12px; }
    .unresolved-subject { font-size: 11px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; text-decoration: none; display: block; }
    .unresolved-subject:hover { color: #0a66c2; text-decoration: underline; }
    .unresolved-actions { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
    .unresolved-select {
      flex: 1;
      font-size: 11px;
      padding: 3px 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
    }
    .assign-btn {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border: none;
      border-radius: 4px;
      background: #0a66c2;
      color: #fff;
      cursor: pointer;
    }
    .assign-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .assign-btn:hover:not(:disabled) { background: #0855a3; }
    .dismiss-btn { font-size: 10px; color: #bbb; background: none; border: none; cursor: pointer; padding: 0; }
    .dismiss-btn:hover { color: #888; text-decoration: underline; }

  </style>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen">
    <div class="brand-name">LinkedList</div>
    <p class="brand-tagline">Track LinkedIn jobs directly<br>to your Google Sheet</p>
    <button id="signin-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <p id="auth-error"></p>
  </div>

  <!-- Main screen -->
  <div id="main-screen">
    <header>
      <h1>LinkedList</h1>
      <span id="job-count">0 jobs</span>
    </header>
    <div id="user-bar">
      <span id="user-email"></span>
      <button id="signout-btn">Sign out</button>
    </div>
    <div id="toolbar">
      <button class="toolbar-btn" id="open-sheet-btn" disabled title="Track a job first to create your sheet">Open Sheet</button>
    </div>
    <div id="empty">
      <strong>No jobs tracked yet</strong>
      <p>Navigate to a LinkedIn job page and click <em>Track</em>.</p>
    </div>
    <div id="job-list"></div>

    <!-- Needs Review -->
    <div id="unresolved-section" style="display:none">
      <div class="section-header"><span>Needs Review</span></div>
      <div id="unresolved-list"></div>
    </div>

    <!-- Email activity -->
    <div id="email-section">
      <div class="section-header">
        <span>Email Activity</span>
        <button id="enable-gmail-btn" style="display:none">Enable</button>
      </div>
      <div id="email-list"></div>
      <div id="email-empty" style="display:none">No job emails detected yet.</div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
