<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    header {
      background: #0a66c2;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    #job-count {
      background: rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 12px;
    }
    #toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid #eee;
    }
    .toolbar-btn {
      flex: 1;
      padding: 6px 0;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #0a66c2;
      color: #0a66c2;
      background: #fff;
    }
    .toolbar-btn:hover { background: #0a66c2; color: #fff; }
    .toolbar-btn.danger { border-color: #c0392b; color: #c0392b; }
    .toolbar-btn.danger:hover { background: #c0392b; color: #fff; }
    #empty {
      padding: 32px 16px;
      text-align: center;
      color: #888;
    }
    #empty p { margin-top: 6px; font-size: 12px; }
    #job-list { max-height: 420px; overflow-y: auto; }
    .job-card {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      position: relative;
    }
    .job-card:hover { background: #f9f9f9; }
    .job-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 2px;
      padding-right: 20px;
    }
    .job-meta { color: #555; font-size: 12px; margin-bottom: 4px; }
    .job-link a {
      color: #0a66c2;
      font-size: 11px;
      text-decoration: none;
      word-break: break-all;
    }
    .job-link a:hover { text-decoration: underline; }
    .job-date { color: #aaa; font-size: 11px; margin-top: 3px; }
    .remove-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }
    .remove-btn:hover { color: #c0392b; }
  </style>
</head>
<body>
  <header>
    <h1>Job Tracker</h1>
    <span id="job-count">0 jobs</span>
  </header>
  <div id="toolbar">
    <button class="toolbar-btn" id="export-json-btn">Export JSON</button>
    <button class="toolbar-btn" id="export-csv-btn">Export CSV</button>
    <button class="toolbar-btn danger" id="clear-btn">Clear All</button>
  </div>
  <div id="empty">
    <strong>No jobs tracked yet</strong>
    <p>Navigate to a LinkedIn job page and click <em>Track Job</em>.</p>
  </div>
  <div id="job-list"></div>
  <script src="popup.js"></script>
</body>
</html>
